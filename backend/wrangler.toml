name = "cfrss"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Logging configuration
[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
# FRONTEND_ORIGIN = "https://localhost:3000"
# GITHUB_CLIENT_ID = ""       # Set via Cloudflare Dashboard (Secrets)
# GITHUB_CLIENT_SECRET = ""   # Set via Cloudflare Dashboard (Secrets)
# SESSION_SECRET = ""         # Set via Cloudflare Dashboard (Secrets)
# ALLOWED_GITHUB_USER = ""    # Set via Cloudflare Dashboard (optional)

[[d1_databases]]
binding = "DB"
database_name = "rss-reader"
database_id = "ac7a1692-de9f-47b2-9a32-78a75fb61317"  # Replace with your actual D1 database ID
preview_database_id = "ac7a1692-de9f-47b2-9a32-78a75fb61317"

# Cron Trigger for RSS fetching
[triggers]
crons = ["0 */12 * * *"]  # Every 12 hours

# Development configuration
[dev]
port = 8787
local_protocol = "http"
