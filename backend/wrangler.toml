name = "rss-reader-backend"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Logging configuration
[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
FRONTEND_ORIGIN = "https://rss.lain.today"
# GITHUB_CLIENT_ID = "your-github-client-id"  # Uncomment and set your GitHub OAuth App client ID
# GITHUB_CLIENT_SECRET = "your-github-client-secret"  # Uncomment and set your GitHub OAuth App client secret
# SESSION_SECRET = "your-session-secret"  # Uncomment and set a random secret for JWT signing
# ALLOWED_GITHUB_USER = "your-github-username"  # Uncomment to restrict access to specific GitHub user

[[d1_databases]]
binding = "DB"
database_name = "rss-reader"
database_id = "ac7a1692-de9f-47b2-9a32-78a75fb61317"  # Replace with your actual D1 database ID
preview_database_id = "ac7a1692-de9f-47b2-9a32-78a75fb61317"

# Cron Trigger for RSS fetching
[triggers]
crons = ["0 */12 * * *"]  # Every 12 hours

# Development configuration
[dev]
port = 8787
local_protocol = "http"
